<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | IUEA Today</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <style>
        :root {
            --iuea-maroon: #800000;
            --iuea-gray: #4a4a4a;
            --iuea-gray-light: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #fafafa 0%, #f3f4f6 100%);
            color: var(--iuea-gray);
            padding: 2rem;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
            margin-bottom: 1.25rem;
        }
        h1 {
            color: var(--iuea-maroon);
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }
        p {
            color: var(--iuea-gray-light);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        button {
            background: var(--iuea-maroon);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #600000; }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="assets/images/iuea-logo.png" alt="IUEA Logo">
        <h1>You&rsquo;re offline</h1>
        <p>IUEA Today needs a network connection for live updates. Cached pages and previously loaded content may still be available.</p>
        <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
</body>
</html>
